<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskDeck</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="app.js"></script>
</head>
<body>

  <!-- ===== LOADING SCREEN ===== -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-inner">
      <div class="loading-logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">TaskDeck</span>
      </div>
      <div class="loading-bar"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
      <p class="loading-text" id="loadingText">Loading…</p>
      
      <div id="loadingRecovery" class="loading-recovery" style="display: none;">
        <button class="btn-ghost" onclick="window.location.reload()">Reload Page</button>
        <button class="profile-menu-item danger" id="forceResetBtn" style="justify-content: center;">Sign Out & Reset</button>
      </div>
    </div>
  </div>

  <!-- ===== AUTH OVERLAY ===== -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">TaskDeck</span>
      </div>
      <p class="auth-tagline">Visual project management</p>
      <div id="authError" class="auth-error" style="display:none;"></div>

      <div id="signInForm">
        <h2 class="auth-heading">Welcome back</h2>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="signInEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="signInPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn-auth-primary" id="signInBtn">Sign In</button>
        <p class="auth-switch">No account? <a href="#" id="showSignUp">Create one</a></p>
      </div>

      <div id="signUpForm" style="display:none;">
        <h2 class="auth-heading">Create account</h2>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="signUpEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label>Display Name</label>
          <input type="text" id="signUpName" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="signUpPassword" placeholder="Min. 6 characters" autocomplete="new-password" />
        </div>
        <button class="btn-auth-primary" id="signUpBtn">Create Account</button>
        <p class="auth-switch">Have an account? <a href="#" id="showSignIn">Sign in</a></p>
      </div>
    </div>
  </div>

  <!-- ===== APP SHELL ===== -->
  <div id="appShell" style="display:none; flex-direction:column; height:100vh;">

    <!-- HEADER -->
    <header class="app-header" id="appHeader">
      <div class="header-left">
        <!-- Logo / back-to-dashboard button -->
        <a href="#" class="logo logo-btn" id="logoHomeBtn" aria-label="All boards">
          <span class="logo-mark">◈</span>
          <span class="logo-text">TaskDeck</span>
        </a>
        <!-- Board breadcrumb (shown when inside a board) -->
        <div class="board-breadcrumb" id="boardBreadcrumb" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <h1 class="board-title" id="boardTitle" contenteditable="true" spellcheck="false"></h1>
        </div>
      </div>
      <div class="header-right">
        <div class="sync-status" id="syncStatus">
          <span class="sync-dot" id="syncDot"></span>
          <span class="sync-label" id="syncLabel">Saved</span>
        </div>
        <button class="btn-ghost" id="boardSettingsBtn" aria-label="Board settings" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 10a2 2 0 100-4 2 2 0 000 4z" fill="currentColor"/><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11z" fill="currentColor"/></svg>
          Settings
        </button>
        <button class="btn-ghost" id="addListBtn" aria-label="Add new list" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          New List
        </button>
        <!-- Profile button -->
        <div class="profile-wrap" id="profileWrap">
          <button class="avatar" id="profileBtn" aria-label="Profile menu" aria-haspopup="true">?</button>
          <!-- Profile dropdown -->
          <div class="profile-dropdown" id="profileDropdown" aria-hidden="true">
            <div class="profile-info">
              <div class="profile-avatar-lg" id="profileAvatarLg">?</div>
              <div class="profile-details">
                <div class="profile-name" id="profileName">—</div>
                <div class="profile-email" id="profileEmail">—</div>
              </div>
            </div>
            <div class="profile-divider"></div>

            <!-- Display name edit -->
            <div class="profile-section-label">Display Name</div>
            <div class="profile-name-row">
              <input type="text" class="profile-name-input" id="profileNameInput" placeholder="Your name" />
              <button class="btn-profile-save" id="saveNameBtn">Save</button>
            </div>

            <div class="profile-divider"></div>

            <!-- Theme toggle -->
            <div class="profile-section-label">Theme</div>
            <div class="theme-options" id="themeOptions">
              <button class="theme-btn" data-theme="light">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                Light
              </button>
              <button class="theme-btn" data-theme="dark">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13.5 10A6 6 0 016 2.5a6 6 0 100 11 6 6 0 007.5-3.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                Dark
              </button>
              <button class="theme-btn" data-theme="system">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 14h6M8 12v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                System
              </button>
            </div>

            <div class="profile-divider"></div>

            <button class="profile-menu-item danger" id="signOutBtn">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== BOARDS DASHBOARD ===== -->
    <main class="dashboard" id="dashboard">
      <div class="dashboard-inner">
        <div class="dashboard-header">
          <h2 class="dashboard-title">My Boards</h2>
          <div class="dashboard-controls">
            <div class="search-box">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" class="search-icon"><path d="M7 13A6 6 0 107 1a6 6 0 000 12zM11.5 11.5L15 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              <input type="text" id="boardSearch" placeholder="Search boards..." />
            </div>
            <select id="boardSort" class="sort-select">
              <option value="recent">Most Recent</option>
              <option value="oldest">Oldest First</option>
              <option value="alpha">Alphabetical (A-Z)</option>
              <option value="alpha-rev">Alphabetical (Z-A)</option>
            </select>
          </div>
          <button class="btn-primary" id="newBoardBtn">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            New Board
          </button>
        </div>
        <div class="boards-grid" id="boardsGrid">
          <!-- Board cards injected by JS -->
        </div>
      </div>
    </main>

    <!-- ===== BOARD VIEW ===== -->
    <main class="board-container" id="boardContainer" style="display:none;">
      <div class="board-scroll" id="boardScroll">
        <button class="add-list-ghost" id="addListGhost" aria-label="Add a new list">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Add another list
        </button>
      </div>
    </main>

  </div><!-- /appShell -->

  <!-- ===== CARD DETAIL MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalCardTitle">
    <div class="modal" id="cardModal">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <span class="modal-list-badge" id="modalListBadge"></span>
          <h2 class="modal-card-title" id="modalCardTitle" contenteditable="true" spellcheck="false"></h2>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Close modal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <label class="modal-label">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Description
          </label>
          <textarea class="modal-desc" id="modalDesc" placeholder="Add a more detailed description…" rows="4"></textarea>
        </div>
        <div class="modal-section">
          <label class="modal-label">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 1v3M11 1v3M1 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Due Date
          </label>
          <input type="date" class="modal-date" id="modalDate" />
        </div>
        <div class="modal-section">
          <label class="modal-label">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.8 3.6L14 5.5l-3 2.9.7 4.1L8 10.4l-3.7 2.1.7-4.1L2 5.5l4.2-.9L8 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            Priority
          </label>
          <div class="priority-group" id="priorityGroup">
            <button class="priority-btn" data-priority="low">Low</button>
            <button class="priority-btn" data-priority="medium">Medium</button>
            <button class="priority-btn" data-priority="high">High</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" id="deleteCardBtn">Delete Card</button>
        <button class="btn-primary" id="saveCardBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ===== NEW BOARD MODAL ===== -->
  <div class="modal-overlay" id="newBoardOverlay" role="dialog" aria-modal="true" aria-labelledby="newBoardTitle">
    <div class="modal modal-sm" id="newBoardModal">
      <div class="modal-header">
        <h2 class="modal-card-title" id="newBoardModalHeading" style="cursor:default;">New Board</h2>
        <button class="modal-close" id="newBoardClose" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <label class="modal-label">Board Name</label>
          <input type="text" class="modal-input" id="newBoardName" placeholder="e.g. Marketing Campaign" maxlength="60" />
        </div>
        <div class="modal-section">
          <label class="modal-label">Color</label>
          <div class="board-color-picker" id="boardColorPicker">
            <button class="color-swatch active" data-color="#C97D4E" style="background:#C97D4E;" aria-label="Terracotta"></button>
            <button class="color-swatch" data-color="#4E7FC9" style="background:#4E7FC9;" aria-label="Blue"></button>
            <button class="color-swatch" data-color="#4E9B6F" style="background:#4E9B6F;" aria-label="Green"></button>
            <button class="color-swatch" data-color="#9B4EC9" style="background:#9B4EC9;" aria-label="Purple"></button>
            <button class="color-swatch" data-color="#C94E7F" style="background:#C94E7F;" aria-label="Rose"></button>
            <button class="color-swatch" data-color="#5A5248" style="background:#5A5248;" aria-label="Slate"></button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="newBoardCancelBtn">Cancel</button>
        <button class="btn-primary" id="createBoardBtn">Create Board</button>
      </div>
    </div>
  </div>

  <!-- ADD CARD FORM TEMPLATE -->
  <template id="addCardFormTemplate">
    <div class="add-card-form">
      <textarea class="add-card-input" placeholder="Card title…" rows="2"></textarea>
      <div class="add-card-actions">
        <button class="btn-confirm">Add Card</button>
        <button class="btn-cancel-form">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </template>

</body>
</html>
